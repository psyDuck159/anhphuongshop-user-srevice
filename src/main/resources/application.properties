spring.application.name=userservice
server.port=8082

spring.profiles.active=localhost

spring.config.activate.on-profile=localhost
spring.cloud.config.uri=http://config-server:5859

eureka.instance.hostname=user-service
eureka.instance.instance-id=${spring.application.name}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.datasource.url=jdbc:postgresql://localhost:5432/anhphuongshop
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=usersvc
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

#OAuth2 Resource Server configuration
keycloak.base_url=http://localhost:8080
keycloak.realm=anhphuongshop
keycloak.username=admin
keycloak.password=Admin@123456
keycloak.client_id=admin-cli
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.base_url}/realms/${keycloak.realm}


# JWT configuration
jwt.issuer_uri=${keycloak.base_url}/realms/${keycloak.realm}/protocol/openid-connect/token
jwt.client_id=user-service
jwt.client_secret=gsIt4HstSqqKOPkPKfp0bWEbPfKiuA4U
jwt.grant_type=client_credentials
jwt.scope=openid offline_access

logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.springframework.web=DEBUG

# Observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://192.168.1.51:4318/v1/traces
